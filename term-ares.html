<h1>Ares</h1><div class="cat">reasoning</div><div class="aka">別名・表記: Ares研究、動的Effort選択</div>
<p class="plain">各Agent Stepの難しさに応じてReasoning Effortを動的に選ぶ研究方式。常にHighへ固定するのではなく、必要な場面だけ計算量を増やすことで、成功率とトークン消費の両立を狙う。</p><div class="calc"><span class="l">計算・導出</span>High固定比の削減率 = (1,007K − 476K) ÷ 1,007K × 100 = 52.73%。本文の成功率差は58.5% − 54.8% = 3.7ポイント。</div>
