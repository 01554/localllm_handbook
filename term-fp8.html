<h1>FP8</h1><div class="cat">数値形式</div><div class="aka">別名・表記: 8-bit floating point、8ビット浮動小数点</div>
<p class="plain">重みなどを8ビットの浮動小数点形式で表し、容量と転送量を抑える方法である。重みだけなら1パラメータ約1byteとして概算できるが、Scale、Metadata、配置余白、Runtime領域が加わるため、実際の必要VRAMは大きくなる。</p><div class="calc"><span class="l">計算・導出</span>生の重み容量[GB]≒パラメータ数[B]×1。運用概算では、必要VRAM≒パラメータ数[B]×1×1.2〜1.3。</div>
