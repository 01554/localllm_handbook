<h1>Prompt Cache</h1><div class="cat">キャッシュ</div><div class="aka">別名・表記: Promptキャッシュ、Prefix Cache、Prefixキャッシュ</div>
<p class="plain">複数リクエストで共通する入力の先頭部分を再利用し、同じPrefill計算を繰り返さないためのキャッシュである。短期的な高速化機構であり、監査可能な長期記憶を保存するMemory Serviceの代わりにはならない。</p>
