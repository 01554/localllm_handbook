<h1>User tok/sec</h1><div class="cat">性能</div><div class="aka">別名・表記: 個別tok/sec、ユーザー生成速度</div>
<p class="plain">一つの利用者またはシーケンスが受け取るDecode速度である。最初のトークンより後の生成区間を測るため、生成トークン数から1を引く式が使われる。</p><div class="calc"><span class="l">計算・導出</span>User tok/sec=(生成トークン数−1)÷(最終Token時刻−最初Token時刻)。600トークンでは7tok/s:599÷7=85.57秒、25tok/s:23.96秒、50tok/s:11.98秒、100tok/s:5.99秒、1,000tok/s:0.599秒。</div>
