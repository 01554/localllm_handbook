<h1>FP4</h1><div class="cat">低精度・速度</div><div class="aka">別名・表記: NVFP4、MXFP4、4bit浮動小数点</div>
<p class="plain">FP4は、値を4ビット級で表す低精度の浮動小数点形式です。添付ブリーフでは重みが約0.5バイト/パラメータとなり、FP8の半分、BF16の4分の1の読み出し量として扱われます。NVFP4はNVIDIA Blackwell系、MXFP4はAMD CDNA4で使われ、A100、H100、H200はFP4非対応です。重みのFP4化とKVキャッシュのビット数は別設定であり、効果は知能向上ではなく主にメモリ使用量と計算・転送時間の削減です。</p>
