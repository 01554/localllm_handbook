<h1>OOM</h1><div class="cat">メモリ</div><div class="aka">別名・表記: Out of Memory、容量不足、メモリ不足</div>
<p class="plain">必要なメモリを確保できず、モデルの読み込みや推論が失敗する状態である。理論上の帯域計算で速度が求められても、容量を超える構成は実際には動作しない。</p><div class="calc"><span class="l">計算・導出</span>32B Q4重み16GB + 32K BF16 KV 8GiB×1.073741824=8.59GB、合計約24.59GB。RTX 3090の24GBを超えるためOOMで、RTX 5090の32GBでも残りは32−24.59=約7.41GB。</div>
