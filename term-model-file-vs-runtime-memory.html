<h1>モデルファイルサイズ</h1><div class="cat">メモリ</div><div class="aka">別名・表記: 実VRAM使用量、Runtime使用量</div>
<p class="plain">モデルファイルサイズは主に保存された重みと付随情報の大きさであり、実行中の総メモリ量ではない。実VRAMにはKV、Activation、Workspace、通信バッファ、Allocator情報、断片化への余裕などが加わる。</p><div class="calc"><span class="l">計算・導出</span>実VRAM使用量 ≈ モデルファイル由来の重み + KV + Activation + Workspace + Runtime/通信 + 断片化・運用余裕。</div>
