<h1>Key</h1><div class="cat">モデル</div><div class="aka">別名・表記: Value、K、V、Attention用KeyとValue</div>
<p class="plain">Attentionで過去の情報を検索し、取り出すために使われる二種類の中間表現である。KVキャッシュの式の先頭にある2は、KeyとValueの両方を保存することを表す。</p><div class="calc"><span class="l">計算・導出</span>KV bytes/request = 2 × 層数 × KV Head数 × Head次元 × 1要素bytes × Sequence長。先頭の2 = Key 1組 + Value 1組。</div>
