<h1>効率η</h1><div class="cat">低精度・速度</div><div class="aka">別名・表記: η、帯域効率</div>
<p class="plain">効率ηは、理論上の帯域や性能のうち、実際にどれだけ使えたかを表す比率です。ηが1に近いほど理論値に近く、低いほど転送待ちや実装上の損失が大きいと考えます。</p><div class="calc"><span class="l">計算・導出</span>η = 実効メモリ帯域 ÷ 理論メモリ帯域、実効メモリ帯域 = η × 理論メモリ帯域</div>
