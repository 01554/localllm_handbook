<h1>Embedding</h1><div class="cat">モデル</div><div class="aka">別名・表記: 埋め込み、Embedding層</div>
<p class="plain">離散的なトークンや文書を、モデルが計算できる数値ベクトルへ変換した表現である。モデル内部のEmbedding層と、Semantic Indexで類似検索に使う文書Embeddingは用途が異なるが、どちらも数値ベクトルへの写像という点は共通する。</p><div class="calc"><span class="l">計算・導出</span>単純な全重みQ4容量は、Embeddingなど一部を高精度で残す構成では実容量を過小評価する。</div>
